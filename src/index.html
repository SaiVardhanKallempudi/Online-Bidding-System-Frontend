<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="description" content="BidMart - Online bidding system for college stalls">
  <meta name="keywords" content="bidmart, online bidding, college stalls">
  <meta property="og:title" content="BidMart - Online Bidding System">
  <meta property="og:description" content="Bid on college stalls online">
  <meta property="og:url" content="https://bidmart.me">

  <title>BidMart - Online Bidding System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">

  <!-- Preconnect to API -->
  <link rel="preconnect" href="https://api.bidmart.me">
  <link rel="dns-prefetch" href="https://api.bidmart.me">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Loading spinner -->
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .app-loader {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f9fafb;
      font-family: 'Inter', sans-serif;
    }
    .app-loader-spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    .app-loader-text {
      color: #6b7280;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body>
  <app-root>
    <div class="app-loader">
      <div>
        <div class="app-loader-spinner"></div>
        <p class="app-loader-text">Loading BidMart...</p>
      </div>
    </div>
  </app-root>

  <!-- Vercel Speed Insights -->
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>

  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
